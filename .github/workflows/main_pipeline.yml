name: TechMarket Main Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  ejecutar-pruebas:
    uses: ./.github/workflows/template_test.yml
    with:
      node_version: '20'

  construir-y-subir:
    needs: ejecutar-pruebas
    uses: ./.github/workflows/template_build.yml
    with:
      aws_region: 'us-east-1'
      ecr_repository: 'techmarket-backend'
      image_tag: ${{ github.sha }}
    secrets: inherit

  desplegar-en-eks:
    needs: construir-y-subir
    uses: ./.github/workflows/template_deploy.yml
    with:
      image_uri: ${{ github.sha }}
      cluster_name: 'techmarket-cluster'
      aws_region: 'us-east-1'
    secrets: inherit
