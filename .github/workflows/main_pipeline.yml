name: TechMarket Main Pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  ejecutar-pruebas:
    # Eliminamos "/templates/" de la ruta
    uses: ./.github/workflows/template_test.yml
    with:
      node_version: '20'

  construir-y-subir:
    needs: ejecutar-pruebas
    uses: ./.github/workflows/template_build.yml
    with:
      aws_region: 'us-east-1'
      ecr_repository: 'techmarket-backend'
      image_tag: ${{ github.sha }}
    secrets: inherit

  desplegar-en-eks:
    needs: construir-y-subir
    uses: ./.github/workflows/template_deploy.yml
    with:
      # Mantenemos la URL completa de ECR para evitar el error de despliegue
      image_uri: 219241426160.dkr.ecr.us-east-1.amazonaws.com/techmarket-backend:${{ github.sha }}
      cluster_name: 'techmarket-backend'
      aws_region: 'us-east-1'
      namespace: 'default'
    secrets: inherit
